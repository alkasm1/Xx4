<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ALM-AUDIO — صوت عبر QR</title>
<style>
body {
  margin: 0;
  font-family: "Cairo", sans-serif;
  background: #020617;
  color: #e5e7eb;
}
.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 12px;
}
h1 {
  font-size: 18px;
  margin: 0 0 4px;
}
.sub {
  font-size: 11px;
  color: #9ca3af;
  margin-bottom: 12px;
}
.section-title {
  font-size: 13px;
  margin: 10px 0 4px;
  color: #93c5fd;
}
button {
  border-radius: 8px;
  border: none;
  padding: 8px 10px;
  font-size: 13px;
  cursor: pointer;
  background: #2563eb;
  color: white;
  margin-right: 4px;
}
button.secondary { background: #4b5563; }
button.danger { background: #b91c1c; }
button.green { background: #16a34a; }
button.orange { background: #ea580c; }
.row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
#qrcode {
  margin-top: 8px;
  text-align: center;
}
#reader {
  margin-top: 8px;
  display: none;
}
audio {
  width: 100%;
  margin-top: 8px;
}
.status {
  font-size: 11px;
  color: #a5b4fc;
  margin-top: 4px;
}
.box {
  border: 1px solid #1f2937;
  border-radius: 10px;
  padding: 8px;
  margin-top: 8px;
  background: #020617;
}
input[type="file"] {
  font-size: 11px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div class="app">
  <h1>ALM-AUDIO/1.2</h1>
  <div class="sub">تسجيل 1 ثانية → تسريع ×10 → QR → إبطاء ×10 + صمت → WAV يعمل على كل الأجهزة.</div>

  <!-- إرسال -->
  <div class="box">
    <div class="section-title">إرسال صوت عبر QR</div>

    <div class="row">
      <button onclick="recordOneSecond()">تسجيل 1 ثانية</button>
      <span id="recordStatus" class="status">غير مسجل</span>
    </div>

    <div class="row" style="margin-top:6px;">
      <input type="file" id="audioFile" accept="audio/*" onchange="loadAudioFile()">
    </div>

    <audio id="localAudio" controls></audio>

    <div class="row" style="margin-top:6px;">
      <button class="secondary" onclick="generateAudioQR()">تحويل الصوت إلى QR</button>
    </div>

    <div id="qrcode"></div>

    <div class="row" style="margin-top:6px;">
      <button class="green" onclick="saveQR()">حفظ الباركود</button>
      <button class="orange" onclick="shareQR()">مشاركة الباركود</button>
    </div>
  </div>

  <!-- استقبال -->
  <div class="box">
    <div class="section-title">استقبال صوت من QR</div>

    <div class="row">
      <button onclick="startScan()">بدء المسح بالكاميرا</button>
      <button class="danger" onclick="stopScan()">إيقاف المسح</button>
    </div>

    <div class="row" style="margin-top:6px;">
      <input type="file" accept="image/*" id="qrImageInput" onchange="decodeQRFromImage()">
    </div>

    <div id="reader"></div>
    <audio id="receivedAudio" controls></audio>
    <div id="scanStatus" class="status"></div>
  </div>
</div>

<script>
let recordedBlob = null;
const recordStatus = document.getElementById("recordStatus");
const localAudio = document.getElementById("localAudio");
const receivedAudio = document.getElementById("receivedAudio");
const scanStatus = document.getElementById("scanStatus");

/* تسجيل 1 ثانية ثابتة */
async function recordOneSecond() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const recorder = new MediaRecorder(stream, { mimeType: "audio/webm" });
    let chunks = [];

    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
      recordedBlob = new Blob(chunks, { type: "audio/webm" });
      localAudio.src = URL.createObjectURL(recordedBlob);
      recordStatus.textContent = "تم تسجيل 1 ثانية — جاهز للتحويل.";
      stream.getTracks().forEach(t => t.stop());
    };

    recordStatus.textContent = "جاري التسجيل لمدة 1 ثانية...";
    recorder.start();
    setTimeout(() => recorder.stop(), 1000);
  } catch (e) {
    recordStatus.textContent = "فشل الوصول للميكروفون.";
  }
}

/* تحميل ملف صوتي */
function loadAudioFile() {
  const file = document.getElementById("audioFile").files[0];
  if (!file) return;
  recordedBlob = file;
  localAudio.src = URL.createObjectURL(file);
  recordStatus.textContent = "تم تحميل ملف صوتي — سيتم أخذ 1 ثانية منه.";
}

/* Base64 ↔ Uint8 */
function uint8ToBase64(u8) {
  let bin = "";
  for (let i = 0; i < u8.length; i++) bin += String.fromCharCode(u8[i]);
  return btoa(bin);
}
function base64ToUint8(b64) {
  const bin = atob(b64);
  const u8 = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return u8;
}

/* تسريع AudioBuffer ×10 */
function speedUpBuffer(buffer, factor = 10) {
  const length = Math.floor(buffer.length / factor);
  const ctx = new AudioContext();
  const sped = ctx.createBuffer(1, length, buffer.sampleRate);
  const input = buffer.getChannelData(0);
  const output = sped.getChannelData(0);
  for (let i = 0; i < length; i++) {
    output[i] = input[i * factor];
  }
  return sped;
}

/* تحويل AudioBuffer إلى PCM 8-bit 8kHz */
async function bufferToPCM8(buffer) {
  const targetRate = 8000;
  const offline = new OfflineAudioContext(1, buffer.duration * targetRate, targetRate);
  const src = offline.createBufferSource();
  src.buffer = buffer;
  src.connect(offline.destination);
  src.start();
  const rendered = await offline.startRendering();
  const raw = rendered.getChannelData(0);
  const pcm8 = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) {
    let s = raw[i];
    if (s > 1) s = 1;
    if (s < -1) s = -1;
    pcm8[i] = Math.round((s * 127) + 128);
  }
  return pcm8;
}

/* AudioBuffer → WAV Blob */
function audioBufferToWavBlob(buffer) {
  const numChannels = 1;
  const sampleRate = buffer.sampleRate;
  const bitDepth = 16;
  const samples = buffer.getChannelData(0);
  const blockAlign = numChannels * bitDepth / 8;
  const byteRate = sampleRate * blockAlign;
  const dataSize = samples.length * 2;
  const bufferSize = 44 + dataSize;
  const arrayBuffer = new ArrayBuffer(bufferSize);
  const view = new DataView(arrayBuffer);
  let offset = 0;

  function writeString(str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset++, str.charCodeAt(i));
  }

  writeString("RIFF");
  view.setUint32(offset, 36 + dataSize, true); offset += 4;
  writeString("WAVE");
  writeString("fmt ");
  view.setUint32(offset, 16, true); offset += 4;
  view.setUint16(offset, 1, true); offset += 2;
  view.setUint16(offset, numChannels, true); offset += 2;
  view.setUint32(offset, sampleRate, true); offset += 4;
  view.setUint32(offset, byteRate, true); offset += 4;
  view.setUint16(offset, blockAlign, true); offset += 2;
  view.setUint16(offset, bitDepth, true); offset += 2;
  writeString("data");
  view.setUint32(offset, dataSize, true); offset += 4;

  for (let i = 0; i < samples.length; i++) {
    let s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(offset, s * 0x7fff, true);
    offset += 2;
  }

  return new Blob([arrayBuffer], { type: "audio/wav" });
}

/* PCM8 → AudioBuffer + صمت + WAV */
async function playRestoredPCM(pcm8) {
  const factor = 10;
  const sampleRate = 8000;
  const ctx = new AudioContext();

  const slowLength = pcm8.length * factor;
  const slowBuffer = ctx.createBuffer(1, slowLength, sampleRate);
  const slowData = slowBuffer.getChannelData(0);

  for (let i = 0; i < pcm8.length; i++) {
    const sample = (pcm8[i] - 128) / 127;
    for (let j = 0; j < factor; j++) {
      slowData[i * factor + j] = sample;
    }
  }

  const silenceSamples = Math.floor(sampleRate * 0.5);
  const finalLength = slowLength + silenceSamples * 2;
  const finalBuffer = ctx.createBuffer(1, finalLength, sampleRate);
  const finalData = finalBuffer.getChannelData(0);

  let offset = silenceSamples;
  for (let i = 0; i < slowLength; i++) {
    finalData[offset + i] = slowData[i];
  }

  const wavBlob = audioBufferToWavBlob(finalBuffer);
  const url = URL.createObjectURL(wavBlob);
  receivedAudio.src = url;
}

/* توليد QR */
async function generateAudioQR() {
  if (!recordedBlob) {
    recordStatus.textContent = "لا يوجد صوت.";
    return;
  }

  try {
    const arrayBuffer = await recordedBlob.arrayBuffer();
    const ctx = new AudioContext();
    const fullBuffer = await ctx.decodeAudioData(arrayBuffer);

    const oneSecLength = Math.min(fullBuffer.sampleRate, fullBuffer.length);
    const oneSec = ctx.createBuffer(1, oneSecLength, fullBuffer.sampleRate);
    oneSec.getChannelData(0).set(fullBuffer.getChannelData(0).slice(0, oneSecLength));

    const sped = speedUpBuffer(oneSec, 10);

    const pcm8 = await bufferToPCM8(sped);
    const b64 = uint8ToBase64(pcm8);
    const compressed = LZString.compressToEncodedURIComponent(b64);
    const finalText = "ALM-AUDIO/1.2;" + compressed;

    if (finalText.length > 2000) {
      recordStatus.textContent = "الصوت ما زال كبيرًا على QR.";
      return;
    }

    document.getElementById("qrcode").innerHTML = "";
    new QRCode(document.getElementById("qrcode"), {
      text: finalText,
      width: 220,
      height: 220,
      correctLevel: QRCode.CorrectLevel.M
    });

    recordStatus.textContent = "تم توليد QR.";
  } catch (e) {
    recordStatus.textContent = "خطأ أثناء معالجة الصوت.";
  }
}

/* حفظ QR */
function saveQR() {
  const canvas = document.querySelector("#qrcode canvas");
  if (!canvas) return alert("لا يوجد QR بعد.");
  const link = document.createElement("a");
  link.download = "alm-audio-qr.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

/* مشاركة QR */
function shareQR() {
  const canvas = document.querySelector("#qrcode canvas");
  if (!canvas) return alert("لا يوجد QR بعد.");
  canvas.toBlob(async blob => {
    const file = new File([blob], "alm-audio-qr.png", { type: "image/png" });
    if (navigator.share) {
      await navigator.share({ title: "ALM-AUDIO QR", files: [file] });
    } else {
      alert("المشاركة غير مدعومة على هذا الجهاز.");
    }
  });
}

/* مسح QR بالكاميرا */
let html5QrInstance = null;
const readerDiv = document.getElementById("reader");

function startScan() {
  if (html5QrInstance) return;
  readerDiv.style.display = "block";
  scanStatus.textContent = "جاري تشغيل الكاميرا...";
  html5QrInstance = new Html5Qrcode("reader");
  html5QrInstance.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 220 },
    qrText => {
      handleScannedText(qrText);
      stopScan();
    }
  ).then(() => {
    scanStatus.textContent = "وجّه الكاميرا نحو QR.";
  }).catch(() => {
    scanStatus.textContent = "فشل تشغيل الكاميرا.";
  });
}

function stopScan() {
  if (!html5QrInstance) return;
  html5QrInstance.stop().then(() => {
    html5QrInstance.clear();
    html5QrInstance = null;
    readerDiv.style.display = "none";
  });
}

/* فك QR من صورة */
function decodeQRFromImage() {
  const file = document.getElementById("qrImageInput").files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const html5Qr = new Html5Qrcode("reader");
      readerDiv.style.display = "block";
      html5Qr.scanFile(img, false)
        .then(qrText => {
          handleScannedText(qrText);
          html5Qr.clear();
          readerDiv.style.display = "none";
        })
        .catch(() => {
          scanStatus.textContent = "فشل قراءة QR من الصورة.";
          html5Qr.clear();
          readerDiv.style.display = "none";
        });
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* معالجة النص الممسوح */
async function handleScannedText(qrText) {
  if (!qrText.startsWith("ALM-AUDIO/1.2;")) {
    scanStatus.textContent = "QR غير متوافق مع ALM-AUDIO/1.2";
    return;
  }
  const payload = qrText.slice("ALM-AUDIO/1.2;".length);
  const b64 = LZString.decompressFromEncodedURIComponent(payload);
  if (!b64) {
    scanStatus.textContent = "فشل فك الضغط.";
    return;
  }
  const pcm8 = base64ToUint8(b64);
  await playRestoredPCM(pcm8);
  scanStatus.textContent = "تم استعادة الصوت بنجاح.";
}
</script>

</body>
</html>
