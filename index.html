<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ALM-AUDIO — صوت عبر QR</title>
<style>
body {
  margin: 0;
  font-family: "Cairo", sans-serif;
  background: #020617;
  color: #e5e7eb;
}
.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 12px;
}
h1 {
  font-size: 18px;
  margin: 0 0 4px;
}
.sub {
  font-size: 11px;
  color: #9ca3af;
  margin-bottom: 12px;
}
.section-title {
  font-size: 13px;
  margin: 10px 0 4px;
  color: #93c5fd;
}
button {
  border-radius: 8px;
  border: none;
  padding: 8px 10px;
  font-size: 13px;
  cursor: pointer;
  background: #2563eb;
  color: white;
  margin-right: 4px;
}
button.secondary {
  background: #4b5563;
}
button.danger {
  background: #b91c1c;
}
.row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
#qrcode {
  margin-top: 8px;
  text-align: center;
}
#reader {
  margin-top: 8px;
  display: none;
}
audio {
  width: 100%;
  margin-top: 8px;
}
.status {
  font-size: 11px;
  color: #a5b4fc;
  margin-top: 4px;
}
.box {
  border: 1px solid #1f2937;
  border-radius: 10px;
  padding: 8px;
  margin-top: 8px;
  background: #020617;
}
input[type="file"] {
  font-size: 11px;
}
</style>

<!-- مكتبات خارجية -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div class="app">
  <h1>ALM-AUDIO/1.0</h1>
  <div class="sub">نقل مقطع صوتي قصير عبر QR فقط — بدون إنترنت.</div>

  <!-- قسم الإرسال -->
  <div class="box">
    <div class="section-title">إرسال صوت عبر QR</div>
    <div class="row">
      <button id="recordBtn" onclick="toggleRecording()">بدء التسجيل</button>
      <span id="recordStatus" class="status">غير مسجل</span>
    </div>

    <div class="row" style="margin-top:6px;">
      <input type="file" id="audioFile" accept="audio/*" onchange="loadAudioFile()">
    </div>

    <audio id="localAudio" controls></audio>

    <div class="row" style="margin-top:6px;">
      <button class="secondary" onclick="generateAudioQR()">تحويل الصوت إلى QR</button>
    </div>
    <div id="qrcode"></div>
  </div>

  <!-- قسم الاستقبال -->
  <div class="box">
    <div class="section-title">استقبال صوت من QR</div>
    <div class="row">
      <button onclick="startScan()">بدء المسح بالكاميرا</button>
      <button class="danger" onclick="stopScan()">إيقاف المسح</button>
    </div>

    <div class="row" style="margin-top:6px;">
      <input type="file" accept="image/*" id="qrImageInput" onchange="decodeQRFromImage()">
    </div>

    <div id="reader"></div>
    <audio id="receivedAudio" controls></audio>
    <div id="scanStatus" class="status"></div>
  </div>
</div>

<script>
/* ========= 1) تسجيل الصوت ========= */

let mediaRecorder = null;
let recordedChunks = [];
let recordedBlob = null;

const recordBtn = document.getElementById("recordBtn");
const recordStatus = document.getElementById("recordStatus");
const localAudio = document.getElementById("localAudio");

async function toggleRecording() {
  if (!mediaRecorder || mediaRecorder.state === "inactive") {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      recordedChunks = [];
      mediaRecorder = new MediaRecorder(stream, {
        mimeType: "audio/webm"
      });

      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        recordedBlob = new Blob(recordedChunks, { type: "audio/webm" });
        const url = URL.createObjectURL(recordedBlob);
        localAudio.src = url;
        recordStatus.textContent = "تم التسجيل — جاهز للتحويل إلى QR";
      };

      mediaRecorder.start();
      recordBtn.textContent = "إيقاف التسجيل";
      recordStatus.textContent = "جاري التسجيل... (حاول ألا تتجاوز 1–2 ثانية)";
    } catch (err) {
      console.error(err);
      recordStatus.textContent = "فشل في الوصول للميكروفون";
    }
  } else if (mediaRecorder.state === "recording") {
    mediaRecorder.stop();
    recordBtn.textContent = "بدء التسجيل";
    recordStatus.textContent = "إيقاف التسجيل...";
  }
}

/* ========= 2) تحميل ملف صوتي من المعرض ========= */

function loadAudioFile() {
  const file = document.getElementById("audioFile").files[0];
  if (!file) return;

  recordedBlob = file;
  const url = URL.createObjectURL(file);
  localAudio.src = url;
  recordStatus.textContent = "تم تحميل ملف صوتي — جاهز للتحويل إلى QR (يفضل أن يكون قصيرًا)";
}

/* ========= 3) أدوات تحويل بايتات ↔ Base64 ========= */

function uint8ToBase64(u8) {
  let binary = "";
  for (let i = 0; i < u8.length; i++) {
    binary += String.fromCharCode(u8[i]);
  }
  return btoa(binary);
}

function base64ToUint8(base64) {
  const binary = atob(base64);
  const len = binary.length;
  const u8 = new Uint8Array(len);
  for (let i = 0; i < len; i++) {
    u8[i] = binary.charCodeAt(i);
  }
  return u8;
}

/* ========= 4) تحويل الصوت إلى PCM 8-bit 8kHz ========= */

async function convertToPCM(blob) {
  const arrayBuffer = await blob.arrayBuffer();
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)({
    sampleRate: 8000
  });

  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

  const raw = audioBuffer.getChannelData(0); // mono
  const length = Math.min(raw.length, 8000 * 2); // حد أقصى ~2 ثانية
  const pcm8 = new Uint8Array(length);

  for (let i = 0; i < length; i++) {
    let sample = raw[i];
    if (sample > 1) sample = 1;
    if (sample < -1) sample = -1;
    pcm8[i] = Math.round((sample * 127) + 128); // 8-bit PCM
  }

  return pcm8;
}

/* ========= 5) توليد QR من الصوت ========= */

function generateAudioQR() {
  if (!recordedBlob) {
    recordStatus.textContent = "لا يوجد تسجيل أو ملف صوتي بعد.";
    return;
  }

  convertToPCM(recordedBlob).then(pcm => {
    const b64 = uint8ToBase64(pcm);
    const compressed = LZString.compressToEncodedURIComponent(b64);
    const finalText = "ALM-AUDIO/1.0;" + compressed;

    // تحذير بسيط إذا كان النص كبيرًا
    if (finalText.length > 2000) {
      recordStatus.textContent = "الصوت طويل أو كبير جدًا على QR — حاول تقصيره.";
      return;
    }

    document.getElementById("qrcode").innerHTML = "";
    new QRCode(document.getElementById("qrcode"), {
      text: finalText,
      width: 220,
      height: 220,
      correctLevel: QRCode.CorrectLevel.M
    });

    recordStatus.textContent = "تم توليد QR للصوت.";
  }).catch(err => {
    console.error(err);
    recordStatus.textContent = "خطأ أثناء تحويل الصوت إلى QR.";
  });
}

/* ========= 6) مسح QR بالكاميرا ========= */

let html5QrInstance = null;
const readerDiv = document.getElementById("reader");
const receivedAudio = document.getElementById("receivedAudio");
const scanStatus = document.getElementById("scanStatus");

function startScan() {
  if (html5QrInstance) return;

  readerDiv.style.display = "block";
  scanStatus.textContent = "جاري تشغيل الكاميرا...";

  html5QrInstance = new Html5Qrcode("reader");
  html5QrInstance.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 220 },
    qrText => {
      handleScannedText(qrText);
      stopScan();
    },
    err => {
      // يمكن تجاهل أخطاء القراءة المستمرة
    }
  ).then(() => {
    scanStatus.textContent = "وجّه الكاميرا نحو QR الصوت.";
  }).catch(err => {
    console.error(err);
    scanStatus.textContent = "فشل في تشغيل الكاميرا.";
  });
}

function stopScan() {
  if (!html5QrInstance) return;
  html5QrInstance.stop().then(() => {
    html5QrInstance.clear();
    html5QrInstance = null;
    readerDiv.style.display = "none";
    scanStatus.textContent = "تم إيقاف المسح.";
  });
}

/* ========= 7) فك QR من صورة من المعرض ========= */

function decodeQRFromImage() {
  const file = document.getElementById("qrImageInput").files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const html5Qr = new Html5Qrcode("reader");
      readerDiv.style.display = "block";
      html5Qr.scanFile(img, false)
        .then(qrText => {
          handleScannedText(qrText);
          html5Qr.clear();
          readerDiv.style.display = "none";
        })
        .catch(err => {
          console.error(err);
          scanStatus.textContent = "فشل في قراءة QR من الصورة.";
          html5Qr.clear();
          readerDiv.style.display = "none";
        });
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ========= 8) معالجة النص الممسوح (كاميرا أو صورة) ========= */

function handleScannedText(qrText) {
  if (!qrText.startsWith("ALM-AUDIO/1.0;")) {
    scanStatus.textContent = "البيانات ليست من نوع ALM-AUDIO/1.0";
    return;
  }
  const payload = qrText.slice("ALM-AUDIO/1.0;".length);
  const b64 = LZString.decompressFromEncodedURIComponent(payload);
  if (!b64) {
    scanStatus.textContent = "فشل في فك الضغط.";
    return;
  }

  const pcm8 = base64ToUint8(b64);

  // تحويل PCM 8-bit 8kHz إلى WAV بسيط للتشغيل
  const wavBlob = pcm8ToWavBlob(pcm8, 8000);
  const url = URL.createObjectURL(wavBlob);
  receivedAudio.src = url;
  scanStatus.textContent = "تم استعادة الصوت — يمكنك تشغيله الآن.";
}

/* ========= 9) تحويل PCM 8-bit إلى WAV Blob ========= */

function pcm8ToWavBlob(pcm8, sampleRate) {
  const numChannels = 1;
  const bytesPerSample = 1;
  const blockAlign = numChannels * bytesPerSample;
  const byteRate = sampleRate * blockAlign;
  const dataSize = pcm8.length * bytesPerSample;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  // RIFF header
  writeString(view, 0, "RIFF");
  view.setUint32(4, 36 + dataSize, true);
  writeString(view, 8, "WAVE");

  // fmt chunk
  writeString(view, 12, "fmt ");
  view.setUint32(16, 16, true);      // Subchunk1Size
  view.setUint16(20, 1, true);       // AudioFormat = PCM
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, 8 * bytesPerSample, true); // BitsPerSample

  // data chunk
  writeString(view, 36, "data");
  view.setUint32(40, dataSize, true);

  // PCM data
  let offset = 44;
  for (let i = 0; i < pcm8.length; i++) {
    view.setUint8(offset++, pcm8[i]);
  }

  return new Blob([buffer], { type: "audio/wav" });
}

function writeString(view, offset, str) {
  for (let i = 0; i < str.length; i++) {
    view.setUint8(offset + i, str.charCodeAt(i));
  }
}
</script>

</body>
</html>
